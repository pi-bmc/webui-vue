<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title>OpenBMC Web UI</title>
    <script>
      // Apply the saved/system color theme before first paint to avoid a flash.
      (function () {
        try {
          var pref = localStorage.getItem('colorTheme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark =
            pref === 'dark' || ((!pref || pref === 'system') && prefersDark);
          document.documentElement.setAttribute(
            'data-theme',
            dark ? 'dark' : 'light',
          );
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but this application does not work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
